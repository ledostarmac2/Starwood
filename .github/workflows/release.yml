name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  native:
    name: Native ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: starwood.exe
            artifact: starwood-windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: starwood
            artifact: starwood-macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: starwood
            artifact: starwood-linux-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev libudev-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build -p starwood --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.artifact }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  web:
    name: WebAssembly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build wasm
        run: cargo build -p starwood --release --target wasm32-unknown-unknown

      - name: Build web bundle
        run: trunk build web/index.html --release --dist dist/starwood-web --public-url ./

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: starwood-web
          path: dist/starwood-web
